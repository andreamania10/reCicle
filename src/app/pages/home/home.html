<div class="home-container">

    <!-- HERO / BUSCADOR -->
    <section class="hero">
        <h1>Encuentra exactamente lo que buscas</h1>
        <p>Compra y vende artículos fácilmente</p>
    </section>

    <!-- CATEGORÍAS -->
    <section class="categoriesSection">
        <h2>Explora por categoría</h2>

        <div class="categories">

            <div class="category-card" id="technology" (click)="goToCategory( 'technology') ">
                Tecnología
            </div>

            <div class="category-card" id="electronic" (click)="goToCategory( 'electronic') ">
                Electrónica
            </div>

            <div class="category-card" id="clothes" (click)="goToCategory( 'clothes') ">
                Ropa
            </div>

            <div class="category-card" id="homeAccesories" (click)="goToCategory( 'homeAccesories') ">
                Hogar
            </div>
            <div class="category-card" id="sports" (click)="goToCategory( 'sports') ">
                Deporte
            </div>
            <div class="category-card" id="transport" (click)="goToCategory( 'transport') ">
                Vehículos
            </div>
        </div>
    </section>

    <!-- DESTACADOS -->
    <section class="section ">
        <h2>Destacados</h2>

        <div class="horizontal-cards ">
            <div class="product-card "></div>
            <div class="product-card "></div>
            <div class="product-card "></div>
            <div class="product-card "></div>
        </div>
    </section>

    <!-- RECIENTES -->
    <section class="section ">
        <h2>Subidos recientemente</h2>

        <div class="grid ">
            <div class="product-card big "></div>
            <div class="product-card big "></div>
            <div class="product-card big "></div>
            <div class="product-card big "></div>
        </div>
    </section>

</div>
