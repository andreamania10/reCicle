

<div class="container py-5" style="max-width: 700px;">

  <h2 class="fw-bold mb-4">Editar artículo</h2>

  <!-- Cargando -->
  @if (loading) {
    <div class="text-center py-5">
      <div class="spinner-border text-dark" role="status"></div>
      <p class="text-muted mt-3">Cargando artículo...</p>
    </div>
  }

  <!-- No encontrado -->
  @if (!loading && notFound) {
    <div class="text-center py-5">
      <p class="fs-1">😕</p>
      <p class="text-muted">Artículo no encontrado.</p>
      <a [routerLink]="['/articles']" class="btn btn-dark mt-3">Ver todos los artículos</a>
    </div>
  }

  <!-- Formulario -->
  @if (!loading && !notFound) {
    <form (ngSubmit)="save()">

      <div class="mb-3">
        <label class="form-label fw-semibold">Título</label>
        <input type="text" class="form-control" [(ngModel)]="title" name="title" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Descripción</label>
        <textarea class="form-control" rows="4" [(ngModel)]="description" name="description"></textarea>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Precio</label>
          <input type="number" class="form-control" [(ngModel)]="price" name="price" min="0" step="0.01" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Condición</label>
          <select class="form-select" [(ngModel)]="condition" name="condition">
            <option value="Nuevo">Nuevo</option>
            <option value="Como nuevo">Como nuevo</option>
            <option value="Buen estado">Buen estado</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Ubicación</label>
          <input type="text" class="form-control" [(ngModel)]="location" name="location">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Estado</label>
          <select class="form-select" [(ngModel)]="status" name="status">
            <option value="Borrador">Borrador</option>
            <option value="Publicado">Publicado</option>
            <option value="En revisión">En revisión</option>
            <option value="Retirado">Retirado</option>
            <option value="Vendido">Vendido</option>
          </select>
        </div>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger">{{ errorMessage }}</div>
      }

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-dark flex-grow-1" [disabled]="saving">
          {{ saving ? 'Guardando...' : 'Guardar cambios' }}
        </button>
        <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
          Cancelar
        </button>
      </div>

    </form>
  }

</div>
